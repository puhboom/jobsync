{% extends "base.html" %}
{% block title %}{{ 'New Job' if not job else 'Edit Job' }} - JobSync{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>{{ 'New Job' if not job else 'Edit Job' }}</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Company *</label>
                    <input type="text" class="form-control" name="company" value="{{ job.company or '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Position *</label>
                    <input type="text" class="form-control" name="position" value="{{ job.position or '' }}" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Status</label>
                    <select class="form-select" name="status">
                        <option value="saved" {{ 'selected' if job and job.status == 'saved' else '' }}>Saved</option>
                        <option value="applied" {{ 'selected' if job and job.status == 'applied' else '' }}>Applied</option>
                        <option value="phone_screen" {{ 'selected' if job and job.status == 'phone_screen' else '' }}>Phone Screen</option>
                        <option value="interview" {{ 'selected' if job and job.status == 'interview' else '' }}>Interview</option>
                        <option value="executive_call" {{ 'selected' if job and job.status == 'executive_call' else '' }}>Executive Call</option>
                        <option value="offered" {{ 'selected' if job and job.status == 'offered' else '' }}>Offered</option>
                        <option value="rejected" {{ 'selected' if job and job.status == 'rejected' else '' }}>Rejected</option>
                        <option value="withdrawn" {{ 'selected' if job and job.status == 'withdrawn' else '' }}>Withdrawn</option>
                        <option value="closed" {{ 'selected' if job and job.status == 'closed' else '' }}>Closed</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control" name="location" value="{{ job.location or '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Remote Type</label>
                    <select class="form-select" name="remote_type">
                        <option value="">Select...</option>
                        <option value="remote" {{ 'selected' if job and job.remote_type == 'remote' else '' }}>Remote</option>
                        <option value="hybrid" {{ 'selected' if job and job.remote_type == 'hybrid' else '' }}>Hybrid</option>
                        <option value="on-site" {{ 'selected' if job and job.remote_type == 'on-site' else '' }}>On-site</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Salary</label>
                    <input type="text" class="form-control" name="salary" value="{{ job.salary or '' }}" placeholder="e.g., $100,000 - $120,000">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Applied Date</label>
                    <input type="date" class="form-control" name="applied_date" value="{{ job.applied_date or '' }}">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Job URL</label>
                <input type="url" class="form-control" name="job_url" value="{{ job.job_url or '' }}" placeholder="https://...">
            </div>
            
            {% if not job %}
            <div class="mb-3">
                <label class="form-label">Job Description (Optional - will be parsed by AI)</label>
                <textarea class="form-control" name="description" rows="6" placeholder="Paste job description here..."></textarea>
            </div>
            {% endif %}
            
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea class="form-control" name="notes" rows="3">{{ job.notes or '' }}</textarea>
            </div>
            
            <div class="mb-3">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" name="response_received" id="response_received" {{ 'checked' if job and job.response_received else '' }}>
                    <label class="form-check-label" for="response_received">Response Received</label>
                </div>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">{{ 'Create Job' if not job else 'Update Job' }}</button>
                <a href="{{ url_for('jobs') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
