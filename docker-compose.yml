version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: jobsync_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb_data:/var/lib/mysql
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    networks:
      - jobsync_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobsync_backend
    environment:
      - DATABASE_SERVER=db
      - DATABASE_PORT=3306
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - AI_SERVICE_URL=http://ai-service:8001
      - CORS_ORIGINS=http://localhost:5005,http://frontend:5000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    networks:
      - jobsync_network
    volumes:
      - ./backend:/app
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobsync_frontend
    environment:
      - BACKEND_URL=http://backend:8000
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5000}
    ports:
      - "5005:5000"
    depends_on:
      - backend
    networks:
      - jobsync_network
    volumes:
      - ./frontend:/app
    restart: on-failure

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: jobsync_ai
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    ports:
      - "8001:8001"
    networks:
      - jobsync_network
    volumes:
      - ./ai-service:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  jobsync_network:
    driver: bridge

volumes:
  mariadb_data: